<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Table Schedules For 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>
    <div class="bg-orb orb-three"></div>

    <div class="petal p1">✦</div>
    <div class="petal p2">❀</div>
    <div class="petal p3">✧</div>
    <div class="petal p4">❀</div>
    <div class="petal p5">✦</div>

    <main class="main-section">

        <section id="current-datetime">
            <div class="current-date">Loading date...</div>
            <div class="current-time">Loading time...</div>
        </section>

        <section class="hero-card">
            <div class="card-label">Current Status</div>
            <h1 id="current-period-name">Loading...</h1>

            <div class="info-row">
                <span>👩‍🏫 Teacher</span>
                <strong id="current-teacher">Loading...</strong>
            </div>

            <div class="info-row">
                <span>⏰ Time</span>
                <strong id="current-time-range">--</strong>
            </div>

            <div class="countdown-pill" id="current-countdown">Checking timetable...</div>

            <div id="period-progress-container">
                <div id="period-progress-bar"></div>
            </div>
        </section>

        <section class="next-card">
            <div class="next-header">
                <span>Next Period</span>
                <small id="next-day-label">Today</small>
            </div>

            <h2 id="next-period-name">Loading...</h2>

            <div class="next-details">
                <p>👩‍🏫 <strong id="next-teacher">Loading...</strong></p>
                <p>🕒 <strong id="next-time-range">--</strong></p>
                <p>🚀 <strong id="next-countdown">--</strong></p>
            </div>
        </section>

        <section class="schedule-panel">
            <div class="schedule-title">Today's Schedule</div>
            <div id="today-schedule-list"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
